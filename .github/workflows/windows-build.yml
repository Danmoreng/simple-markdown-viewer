name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build Release
        shell: pwsh
        run: .\build.ps1 -Configuration Release

      - name: Stage release files
        shell: pwsh
        run: |
          $stageDir = "dist\mdviewer-windows-x64"
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
          Copy-Item "build\Release\mdviewer.exe" "$stageDir\mdviewer.exe"
          Copy-Item "LICENSE" "$stageDir\LICENSE"
          Copy-Item "THIRD_PARTY_NOTICES" "$stageDir\THIRD_PARTY_NOTICES"
          if (Test-Path "README.md") {
            Copy-Item "README.md" "$stageDir\README.md"
          }

      - name: Archive release bundle
        shell: pwsh
        run: |
          $zipPath = "dist\mdviewer-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "dist\mdviewer-windows-x64\*" -DestinationPath $zipPath

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdviewer-windows-x64
          path: dist/mdviewer-windows-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mdviewer-windows-x64.zip
          generate_release_notes: true
